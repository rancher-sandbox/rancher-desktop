      # @source
      legendTooltip: |
          Rancher Desktop이 백그라운드에서 실행 중일 때 앱 창을 숨깁니다. 알림 아이콘(표시되는 경우)을 통해 열거나 응용 프로그램 메뉴에서 Rancher Desktop을 실행하여 열 수 있습니다.
