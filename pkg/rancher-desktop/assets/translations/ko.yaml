      message: 스냅샷 '<b>'{snapshot}'</b>'을(를) 복원하는 동안 잠시 기다려 주십시오. 컴퓨터 리소스에 따라 시간이 다소 걸릴 수 있습니다.<br/><br/>이 작업이 진행되는 동안 Rancher Desktop을 일시적으로 사용할 수 없습니다. 완료되면 {snapshot} 스냅샷이 활성화된 상태로 VM이 다시 시작됩니다.
