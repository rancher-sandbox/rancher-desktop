general:
  title: Welcome to Rancher Desktop by SUSE
  description: Rancher Desktop provides Kubernetes and image management through the use of a desktop application.
application:
  behavior:
    autoStart:
      legendText: Startup
      label: Automatically start at login
    background:
      legendText: Background
      legendTooltip: |
          Hide the app window when Rancher Desktop is running in the background. It can be opened via the Notification Icon (if visible) or by running Rancher Desktop from the Applications menu.
    startInBackground:
      label: Start in the background
    windowQuitOnClose:
      label: Quit when closing application window
    notificationIcon:
      legendText: Notification Icon
      label: Hide Notification Icon
    theme:
      legendText: Appearance
      options:
        system:
          label: System
          description: Follow the operating system setting
        light:
          label: Light
          description: Always use light mode
        dark:
          label: Dark
          description: Always use dark mode
  general:
    adminAccess:
      legendText: Administrative Access
      label: Allow administrative credentials (sudo access)
      legendTooltip: If checked, {appName} will acquire administrative credentials ("sudo access") when starting. This enables bridged networking and default docker socket support. Takes effect on next start.
    automaticUpdates:
      legendText: Automatic Updates
      label: Check for updates automatically
    statistics:
      legendText: Statistics
      label: Allow collection of anonymous statistics to help improve {appName}
  locale:
    legendText: Language
    disclaimer: Community and AI tools provide translations. English is the canonical language. Report translation issues on GitHub.
virtualMachine:
  mount:
    type:
      legend: Mount Type
      options:
        reverse-sshfs:
          label: reverse-sshfs
          description: Exposes the filesystem by running an SFTP server.
        9p:
          label: 9p
          description: Exposes the filesystem by using QEMU's virtio-9p-pci devices.
          options:
            cacheMode:
              legend: Cache Mode
              tooltip: Caching policy to be used
              options:
                none: none
                loose: loose
                fscache: fscache
                mmap: mmap
            mSizeInKib:
              legend: Memory Size In KiB
              tooltip: Maximum package size in KiB
            protocolVersion:
              legend: Protocol Version
              tooltip: 9P protocol version
              options:
                9p2000: 9p2000
                9p2000u: 9p2000.u
                9p2000L: 9p2000.L
            securityModel:
              legend: Security Model
              tooltip: Security model used for the export path
              options:
                passthrough: passthrough
                mapped-xattr: mapped-xattr
                mapped-file: mapped-file
                none: none
        virtiofs:
          label: virtiofs
          description: Exposes the filesystem by using an Apple Virtualization framework shared directory device.
  proxy:
    legend: WSL Proxy
    label: Enable the proxy used by rancher-desktop
    addressTitle: Proxy address
    address: Address
    port: Port
    authTitle: Authentication information
    username: Username
    password: Password
    noproxy:
      legend: Proxy bypass list
      placeholder: IP, CIDR, domain, or wildcard (*.example.com) to bypass the proxy
      errors:
        duplicate: Error, item is duplicate.
  type:
    legend: Virtual Machine Type
    options:
      qemu:
        label: QEMU
        description: Use the QEMU emulator.
      vz:
        label: VZ
        description: Use the Apple Virtualization framework.
  useRosetta:
    legend: VZ Option
    label: Enable Rosetta support
containerEngine:
  label: Container Engine
  options:
    moby:
      label: dockerd (moby)
      description: Docker API; use with Docker CLI.
    containerd:
      label: containerd
      description: Namespaces for container images; use with nerdctl.
webAssembly:
  label: WebAssembly (Wasm)
  enabled: Enabled
  description: Please read the documentation before enabling the experimental WebAssembly feature!
allowedImages:
  label: Allowed Image Patterns
  patterns:
